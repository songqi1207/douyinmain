<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工作流中心</title>
  <style>
    :root{--bg:#111213;--panel:#1b1c1e;--panel2:#242528;--line:#3b3c40;--text:#f5f5f5;--muted:#9a9ca2;--gold:#f4bb55;--gold2:#ffd177}
    *{box-sizing:border-box}body{margin:0;background:#111213;color:var(--text);font:14px/1.55 system-ui,-apple-system,"Microsoft YaHei",sans-serif}.app{width:min(1320px,calc(100% - 32px));margin:auto;padding:22px 0 60px}
    .topbar{height:50px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #252629;margin-bottom:22px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}.brand-mark{width:28px;height:28px;border-radius:8px;background:var(--gold);color:#181818;display:grid;place-items:center}.user{color:var(--muted);font-size:12px}.hero{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:18px}.hero h1{font-size:26px;margin:0 0 4px}.hero p{color:var(--muted);margin:0}.search{width:310px;padding:11px 14px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--text);outline:0}.search:focus{border-color:var(--gold)}
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}.tabs{display:flex;gap:8px;overflow:auto;flex:1}.tab,.sort{white-space:nowrap;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--muted);padding:8px 14px;cursor:pointer}.tab.active,.tab:hover{background:var(--gold);border-color:var(--gold);color:#191919}.tab b{margin-left:5px;font-size:11px;opacity:.65}.sort{color:var(--text);outline:0}.count-line{color:var(--muted);font-size:12px;margin-bottom:10px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;min-width:0;transition:.18s;cursor:pointer}.card:hover{border-color:#65676d;transform:translateY(-2px)}.media{height:175px;background:linear-gradient(135deg,#2b2d32,#101112);position:relative;display:grid;place-items:center;overflow:hidden}.media video,.media img{width:100%;height:100%;object-fit:cover}.media-fallback{font-size:45px;color:#777}.play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:#0009;display:grid;place-items:center;font-size:22px;padding-left:3px}.media-label{position:absolute;top:10px;left:10px;background:#000a;color:#eee;border-radius:5px;padding:3px 7px;font-size:11px}.body{padding:12px 13px}.title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}.tag{background:#2b2c30;border-radius:4px;color:#bfc1c6;padding:2px 7px;font-size:11px}.desc{color:var(--muted);font-size:12px;line-height:1.45;height:35px;overflow:hidden}.meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px;color:#85878c;font-size:11px}.metrics{display:flex;gap:10px}.detail{color:var(--gold2)}.empty{grid-column:1/-1;color:var(--muted);border:1px dashed var(--line);border-radius:10px;text-align:center;padding:55px}
    .shade{display:none;position:fixed;inset:0;background:#000b;z-index:5;align-items:center;justify-content:center;padding:18px}.modal{width:min(720px,100%);max-height:calc(100vh - 36px);overflow:auto;background:#202124;border:1px solid #4b4d51;border-radius:13px;padding:20px}.modal-head{display:flex;justify-content:space-between;gap:15px}.modal h2{font-size:20px;margin:0 0 4px}.modal small{color:var(--muted)}.close{border:0;background:transparent;color:#aaa;font-size:23px;cursor:pointer}.modal-preview{height:190px;border-radius:8px;overflow:hidden;background:#151619;display:grid;place-items:center;margin:16px 0}.modal-preview video,.modal-preview img{width:100%;height:100%;object-fit:contain}.modal label{display:block;color:#c9cacf;font-size:13px;margin:12px 0 6px}.modal textarea{width:100%;height:110px;padding:11px;border:1px solid var(--line);border-radius:8px;background:#151619;color:var(--text);resize:vertical}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.actions button{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:7px;padding:8px 14px;cursor:pointer}.actions .primary{background:var(--gold);border-color:var(--gold);color:#191919;font-weight:700}.result{margin-top:11px;color:var(--gold2);font-size:13px}
    @media(max-width:950px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:650px){.app{width:calc(100% - 20px)}.hero{display:block}.search{width:100%;margin-top:14px}.grid{grid-template-columns:1fr}.media{height:190px}}
  </style>
</head>
<body>
<main class="app">
  <header class="topbar"><div class="brand"><span class="brand-mark">W</span><span>工作流中心</span></div><span class="user">后台生成服务</span></header>
  <section class="hero"><div><h1>选择一个工作流开始制作</h1><p>按业务分类浏览，点击卡片查看示例，再输入内容提交生成。</p></div><input id="q" class="search" placeholder="搜索工作流名称或关键词"></section>
  <section class="toolbar"><nav id="tabs" class="tabs"></nav><select id="sort" class="sort"><option value="newest">最新</option><option value="name">名称</option><option value="downloads">使用较多</option></select></section>
  <div id="count" class="count-line"></div><section id="grid" class="grid"></section>
</main>
<div id="shade" class="shade"><form id="form" class="modal"><div class="modal-head"><div><h2 id="modalTitle"></h2><small id="modalSub"></small></div><button type="button" id="close" class="close">×</button></div><div id="preview" class="modal-preview"></div><label for="prompt">输入内容</label><textarea id="prompt" placeholder="输入主题、商品信息、文案或生成要求"></textarea><div class="actions"><button type="button" id="cancel">取消</button><button class="primary">提交生成</button></div><div id="result" class="result"></div></form></div>
<script>
  const state={category:'电商',q:'',sort:'newest',selected:null};const $=s=>document.querySelector(s);
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  async function loadTabs(){const d=await fetch('/api/business/categories').then(r=>r.json());$('#tabs').innerHTML=d.categories.map(x=>`<button class="tab ${x.name===state.category?'active':''}" data-cat="${esc(x.name)}">${esc(x.name)} <b>${x.count}</b></button>`).join('')+`<button class="tab ${state.category==='全部'?'active':''}" data-cat="全部">全部</button>`;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.category=b.dataset.cat;render()})}
  function card(w){const cat=encodeURIComponent(state.category);const preview=w.preview?`<video muted preload="metadata" src="/api/business/preview/${cat}/${encodeURIComponent(w.code)}"></video><span class="play">▶</span>`:`<span class="media-fallback">${w.code.startsWith('G2')?'▣':w.code==='G159'?'♧':'✦'}</span>`;const stats=w.stats||{};return `<article class="card" data-code="${esc(w.code)}" data-name="${esc(w.name)}"><div class="media">${preview}<span class="media-label">${esc(state.category)}</span></div><div class="body"><div class="title">${esc(w.name)}</div><div class="tags">${(w.tags||[state.category]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div class="desc">${esc(w.description||'')}</div><div class="meta"><span class="metrics">◉ ${stats.views||0}　♡ ${stats.favorites||0}　⇩ ${stats.downloads||0}</span><span class="detail">点击查看</span></div></div></article>`}
  async function render(){await loadTabs();const url=`/api/business/workflows?category=${encodeURIComponent(state.category)}&sort=${encodeURIComponent(state.sort)}`;const d=await fetch(url).then(r=>r.json());const q=state.q.trim().toLowerCase();const ws=d.workflows.filter(w=>!q||(`${w.code} ${w.name} ${w.description} ${(w.tags||[]).join(' ')}`).toLowerCase().includes(q));$('#count').textContent=`共 ${ws.length} 个工作流`;$('#grid').innerHTML=ws.length?ws.map(card).join(''):'<div class="empty">这个分类暂时没有对应的工作流</div>';document.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.code,c.dataset.name))}
  async function openDetail(code,name){const d=await fetch(`/api/business/workflows?category=${encodeURIComponent(state.category)}`).then(r=>r.json());const w=d.workflows.find(x=>x.code===code);if(!w)return;state.selected=w;$('#modalTitle').textContent=name;$('#modalSub').textContent=`${code} · ${state.category} · 输入后由后台处理`;$(`#preview`).innerHTML=w.preview?`<video controls preload="metadata" src="/api/business/preview/${encodeURIComponent(state.category)}/${encodeURIComponent(code)}"></video>`:'<span class="media-fallback">暂无预览</span>';$('#prompt').value='';$('#result').textContent='';$('#shade').style.display='flex'}
  function close(){ $('#shade').style.display='none' }$('#close').onclick=close;$('#cancel').onclick=close;$('#shade').onclick=e=>{if(e.target.id==='shade')close()};$('#q').oninput=e=>{state.q=e.target.value;render()};$('#sort').onchange=e=>{state.sort=e.target.value;render()};$('#form').onsubmit=async e=>{e.preventDefault();if(!state.selected)return;const r=await fetch(`/api/business/workflows/${encodeURIComponent(state.selected.code)}/run`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:state.category,inputs:{prompt:$('#prompt').value}})}).then(x=>x.json());$('#result').textContent=r.message||`任务 ${r.job_id} 已提交`};render();
</script>
</body>
</html>
